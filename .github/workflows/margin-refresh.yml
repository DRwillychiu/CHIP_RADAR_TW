name: 2. Margin Refresh (Multi-Layer Defense)

# v3.14.8: 7 重防禦排程
# 解決 GitHub schedule 不可靠 + TWSE/HiStock 公告時差問題
# 設計原則:
#   1. 跨度大 (22:30 → 12:00 隔日, 14 小時)
#   2. 多時段冗餘 (7 個時段, GitHub 跳過 7 個的機率極低)
#   3. 聰明跳過 (crawler 端已有邏輯, T-0 後不再重複跑)

on:
  schedule:
    # 台灣時間 22:30 (UTC 14:30) - TWSE 剛公告當日
    - cron: '30 14 * * 1-5'
    # 台灣時間 23:30 (UTC 15:30) - HiStock 同步機會
    - cron: '30 15 * * 1-5'
    # 台灣時間 00:30 (UTC 16:30) - 午夜資料穩定
    - cron: '30 16 * * 2-6'
    # 台灣時間 02:00 (UTC 18:00) - 深夜 fallback
    - cron: '0 18 * * 2-6'
    # 台灣時間 08:00 (UTC 00:00) - 上班前最後保險
    - cron: '0 0 * * 2-6'
    # 台灣時間 09:00 (UTC 01:00) - 盤前確保
    - cron: '0 1 * * 2-6'
    # 台灣時間 12:00 (UTC 04:00) - 午休最後機會
    - cron: '0 4 * * 2-6'
  
  workflow_dispatch:

permissions:
  contents: write

jobs:
  margin_refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install requests cryptography
      
      - name: Run margin_only
        env:
          CHIP_RADAR_PASSWORD: ${{ secrets.CHIP_RADAR_PASSWORD }}
          CHIP_RADAR_STAGE: margin_only
        run: |
          echo "🎯 STAGE=margin_only (融資融券補更新)"
          echo "   台灣時間: $(TZ=Asia/Taipei date +%Y-%m-%d\ %H:%M:%S)"
          python crawler.py
        continue-on-error: true
      
      - name: Commit and push data
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add data/
          
          # 檢查是否有變動 (聰明跳過機制 - 沒變動就 exit)
          if git diff --staged --quiet; then
            echo "✅ 融資融券已是最新 T-0 (無需更新)"
            exit 0
          fi
          
          git commit -m "🔄 [MARGIN] Margin update $(TZ=Asia/Taipei date +%Y-%m-%d\ %H:%M)"
          
          # Push with retry (萬一同時多個 workflow push)
          for i in 1 2 3; do
            if git push; then
              echo "✅ Push success on attempt $i"
              break
            else
              echo "⚠️ Push attempt $i failed, retry..."
              git pull --rebase --strategy-option=theirs || git rebase --abort
              sleep $((i * 5))
            fi
          done
