name: Daily Chip Data Crawl

on:
  # 每個交易日台灣時間 18:30 自動執行 (UTC 10:30)
  # 選 18:30 是因為券商分點資料通常要等收盤 (13:30) 後 5 小時才完整
  schedule:
    - cron: '30 10 * * 1-5'
  # 允許手動觸發
  workflow_dispatch:

# 給 Action 寫入權限以 commit 資料
permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install requests
      
      - name: Run crawler
        run: |
          python crawler.py
        continue-on-error: true
      
      - name: Commit and push data
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Update chip data $(date -u +%Y-%m-%d)"
            git push
          fi
